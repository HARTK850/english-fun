name: Build and Deploy Angular App

on:
  push:
    branches:
      - main # מפעיל את הפעולה בכל push לענף הראשי

permissions:
  contents: write # נדרש כדי לאפשר ל-Action לכתוב לענף ה-gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. שליחת הקוד העדכני של הפרויקט למחשב הווירטואלי של גיטהאב
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. התקנת סביבת העבודה Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # גרסת ה-Node המתאימה לפרויקט Angular עדכני
          cache: 'npm'

      # 3. התקנת כל תלויות הפרויקט (Packages)
      - name: Install Dependencies
        run: npm ci

      # 4. הרצת בדיקות (סטפ אופציונלי - בהתאם לקובץ app.spec.ts שלך)
      - name: Run Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true # מאפשר להמשיך גם אם חלק מהבדיקות לא הוגדרו עדיין מלאה

      # 5. בניית פרויקט ה-Angular (הפלט יישמר בתיקיית dist)
      - name: Build Application
        run: npm run build -- --configuration=production

      # 6. פריסת קובצי האתר ל-GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/browser # נתיב תיקיית הפלט (ייתכן ותצטרך להתאים את השם המדויק לפי ה-package.json שלך)
          branch: gh-pages # הענף אליו יידחפו קובצי האתר המוכנים
